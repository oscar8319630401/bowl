name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# 배포가 겹치면 나중 것만 살린다 (진행 중인 건 취소하지 않음)
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npx tsc --noEmit

      # configure-pages를 빌드보다 먼저 두면 Pages 미설정을 즉시 알 수 있다.
      # (뒤에 두면 npm ci와 빌드를 다 돌린 뒤에야 실패해서 시간만 버린다)
      - uses: actions/configure-pages@v5

      - run: npx vite build
        env:
          GITHUB_PAGES: '1'

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
